services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openaiops
      POSTGRES_PASSWORD: openaiops
      POSTGRES_DB: openaiops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openaiops -d openaiops"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://openaiops:openaiops@postgres:5432/openaiops?schema=public
      NEXTAUTH_SECRET: change-me-in-production
      INGEST_API_KEYS: dev_ingest_key
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push && npm run start"

volumes:
  postgres_data:
